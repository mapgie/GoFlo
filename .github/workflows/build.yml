name: Build APK

# PR validation only. Publishing happens automatically when a Release PR
# merges to main — see .github/workflows/publish-release.yml.

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.kt"
      - "**/*.xml"
      - "**/*.gradle.kts"
      - "gradle/libs.versions.toml"
      - "gradle/wrapper/**"
      - "gradle.properties"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Accessibility role check
        run: python3 a11y_check.py --fails-only

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'
          cache-read-only: false

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Run unit tests
        run: gradle :app:test --no-daemon

      - name: Run lint
        run: gradle :app:lintDebug --no-daemon

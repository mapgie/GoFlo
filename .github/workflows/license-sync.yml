name: Licence screen sync check
on:
  pull_request:
    branches: [main]
    paths:
      - "gradle/libs.versions.toml"
permissions:
  contents: read
jobs:
  check:
    uses: mapgie/android-Actions/.github/workflows/license-sync.yml@dd75ec70a809295343d167556395fc3cfddb0242
    with:
      screen-file: LicensesScreen.kt
      screen-path: app/src/main/java/com/mapgie/goflo/ui/screens/licenses/LicensesScreen.kt

name: Licence screen sync check
on:
  pull_request:
    branches: [main]
    paths:
      - "gradle/libs.versions.toml"
permissions:
  contents: read
jobs:
  check:
    uses: mapgie/android-Actions/.github/workflows/license-sync.yml@14f72d0acca36d4ce4dcc643beac4c42ca6fe3ab
    with:
      screen-file: LicensesScreen.kt
      screen-path: app/src/main/java/com/mapgie/goflo/ui/screens/licenses/LicensesScreen.kt

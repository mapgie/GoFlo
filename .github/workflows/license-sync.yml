name: Licence screen sync check

on:
  pull_request:
    branches: [main]
    paths:
      - "gradle/libs.versions.toml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if LicensesScreen.kt was not updated
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$CHANGED" | grep -q "LicensesScreen.kt"; then
            echo "LicensesScreen.kt updated alongside libs.versions.toml — good."
          else
            echo "::error::gradle/libs.versions.toml changed but LicensesScreen.kt was not updated. Add or remove the library in app/src/main/java/com/mapgie/goflo/ui/screens/licenses/LicensesScreen.kt."
            exit 1
          fi

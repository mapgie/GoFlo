name: Licence screen sync check
on:
  pull_request:
    branches: [main]
    paths:
      - "gradle/libs.versions.toml"
permissions:
  contents: read
jobs:
  check:
    uses: mapgie/android-Actions/.github/workflows/license-sync.yml@87b0b6408e7168235e4977377add51c312ebab71
    with:
      screen-file: LicensesScreen.kt
      screen-path: app/src/main/java/com/mapgie/goflo/ui/screens/licenses/LicensesScreen.kt

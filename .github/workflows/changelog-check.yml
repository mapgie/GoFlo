name: Changelog bump check
on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.kt"
      - "**/*.xml"
      - "**/*.gradle.kts"
      - "gradle/libs.versions.toml"
permissions:
  contents: read
jobs:
  check:
    uses: mapgie/android-Actions/.github/workflows/changelog-check.yml@87b0b6408e7168235e4977377add51c312ebab71

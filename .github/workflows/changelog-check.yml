name: Changelog bump check
on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.kt"
      - "**/*.xml"
      - "**/*.gradle.kts"
      - "gradle/libs.versions.toml"
permissions:
  contents: read
jobs:
  check:
    uses: mapgie/android-Actions/.github/workflows/changelog-check.yml@14f72d0acca36d4ce4dcc643beac4c42ca6fe3ab

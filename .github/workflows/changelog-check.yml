name: Changelog bump check

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.kt"
      - "**/*.xml"
      - "**/*.gradle.kts"
      - "gradle/libs.versions.toml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if CHANGELOG.md was not updated
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$CHANGED" | grep -q "^CHANGELOG.md$"; then
            echo "CHANGELOG.md updated alongside code changes — good."
          else
            echo "::error::Code was changed but CHANGELOG.md was not updated. Add a changelog entry in CHANGELOG.md before merging."
            exit 1
          fi
